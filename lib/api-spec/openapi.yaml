openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VANTAGE API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead capture and contact form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    post:
      operationId: submitLead
      tags: [leads]
      summary: Submit a lead / contact form
      description: Stores lead data and sends a confirmation email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: getLeads
      tags: [leads]
      summary: List all leads
      description: Returns all submitted leads ordered by submission date
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LeadInput:
      type: object
      required:
        - name
        - email
        - clientType
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        company:
          type: ["string", "null"]
        clientType:
          type: string
          enum:
            - letting_agency
            - property_manager
            - serviced_accommodation
            - airbnb_host
            - other
        message:
          type: ["string", "null"]
        sourcePage:
          type: ["string", "null"]

    Lead:
      type: object
      required:
        - id
        - name
        - email
        - clientType
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: ["string", "null"]
        clientType:
          type: string
        message:
          type: ["string", "null"]
        sourcePage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
